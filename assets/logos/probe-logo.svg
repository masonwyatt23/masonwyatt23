<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <rect width="100" height="100" rx="20" fill="#0a0a0a"/>
  <!-- Radar circles -->
  <circle cx="50" cy="50" r="40" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.2"/>
  <circle cx="50" cy="50" r="26" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.35"/>
  <circle cx="50" cy="50" r="14" stroke="#34d399" stroke-width="1.2" stroke-opacity="0.5"/>
  <!-- Sweep arm line: center to ~1 o'clock (mirrors live logo) -->
  <line x1="50" y1="50" x2="85" y2="20" stroke="#34d399" stroke-width="3" stroke-linecap="round"/>
  <!-- Trailing arc behind sweep arm -->
  <path d="M 76 17 A 35 35 0 0 1 90 40" stroke="#34d399" stroke-width="2" stroke-linecap="round" stroke-opacity="0.35"/>
  <!-- Blip dot at tip of sweep arm -->
  <circle cx="85" cy="20" r="6" fill="#34d399" fill-opacity="0.8"/>
  <circle cx="85" cy="20" r="3" fill="white" fill-opacity="0.9"/>
  <!-- Center dot -->
  <circle cx="50" cy="50" r="5" fill="#34d399"/>
  <circle cx="50" cy="50" r="2.5" fill="white" fill-opacity="0.7"/>
</svg>
